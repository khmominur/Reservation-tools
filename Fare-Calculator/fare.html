<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Fare Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <h2>Fare Calculator</h2>

    <div class="input-group">
        <label>Gross Fare</label>
        <input type="number" id="gross_fare" placeholder="Enter Gross Fare">
    </div>

    <div class="input-group">
        <label>Base Fare</label>
        <input type="number" id="base_fare" placeholder="Enter Base Fare">
    </div>

    <div class="input-group">
        <div class="label-container">
            <label>IATA Commission (%)</label>
            <a href="https://raw.githubusercontent.com/khmominur/Fare-Calculator/refs/heads/main/Commission.jpeg" target="_blank" class="info-btn" title="Click to see info">?</a>
        </div>
        <input type="number" id="iata_com" placeholder="Enter Commission %">
    </div>

    <div class="input-group">
        <label>Markup Amount</label>
        <input type="number" id="markup_amount" placeholder="Optional">
    </div>

    <div class="button-group">
        <button class="btn" onclick="calculateFare()">
            <i class="fa-solid fa-calculator"></i> Calculate
        </button>
        <button class="btn btn-reset" onclick="resetForm()">
            <i class="fa-solid fa-rotate"></i> Reset
        </button>
    </div>

    <div class="results" id="results" style="display:none;">
        <p id="ait"></p>
        <p id="iata"></p>
        <p id="net"></p>
    </div>

    <div id="ticket-btn-container" style="display:none; margin-top: 15px;">
        <button class="btn btn-ticket" onclick="openTicketModal()">
            <i class="fa-solid fa-ticket"></i> Generate Ticket Info
        </button>
    </div>
</div>

<!-- Modal -->
<div id="ticketModal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
        <h3><i class="fa-solid fa-plane"></i> Ticket Information</h3>

        <div class="input-group">
            <label>Segment</label>
            <textarea id="segment_input" rows="5" placeholder="Paste segment here...&#10;e.g. 1 SV 809T 03JUL 5 DACJED SS1 1320 1700 /DCSV /E"></textarea>
        </div>

        <div class="input-group">
            <label>Baggage</label>
            <input type="text" id="baggage_input" placeholder="e.g. 30 KG  or  2PC  or  NIL">
        </div>

        <div class="input-group">
            <label>Number of Pax</label>
            <input type="number" id="pax_count" placeholder="1" min="1" value="1">
        </div>

        <!-- Gross Fare Toggle -->
        <div class="gross-fare-toggle">
            <label class="toggle-label" for="show_gross_fare">
                <input type="checkbox" id="show_gross_fare">
                <span class="toggle-custom"></span>
                <span class="toggle-text"><i class="fa-solid fa-tag"></i> Show Gross Fare in output</span>
            </label>
        </div>

        <div class="button-group">
            <button class="btn" onclick="generateTicketInfo()">
                <i class="fa-solid fa-print"></i> Generate
            </button>
            <button class="btn btn-reset" onclick="closeTicketModal()">
                <i class="fa-solid fa-xmark"></i> Cancel
            </button>
        </div>

        <div class="ticket-output" id="ticket_output" style="display:none;">
            <div class="ticket-text" id="ticket_text"></div>
            <button class="btn btn-copy" onclick="copyTicketInfo()">
                <i class="fa-solid fa-copy"></i> Copy
            </button>
        </div>
    </div>
</div>

<div class="footer">
    <p>© 2026 Mominur Rahman. All rights reserved.</p>
</div>
<script src="script.js"></script>
</body>
</html>

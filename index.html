<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservation-tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-deep:       #0a0d14;
      --bg-sidebar:    #0e1220;
      --bg-card:       #141927;
      --border:        rgba(255,255,255,0.06);
      --accent:        #4f8ef7;
      --accent-glow:   rgba(79,142,247,0.25);
      --accent-soft:   rgba(79,142,247,0.12);
      --text-primary:  #e8edf5;
      --text-muted:    #6b7a99;
      --text-dim:      #3d4d6a;
      --active-bg:     rgba(79,142,247,0.15);
      --hover-bg:      rgba(255,255,255,0.04);
      --sidebar-w:     260px;
      --radius:        12px;
    }

    html, body {
      height: 100%;
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .sidebar::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.4;
      pointer-events: none;
    }

    .sidebar::after {
      content: '';
      position: absolute;
      top: -60px;
      left: -40px;
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── BRAND ── */
    .brand {
      padding: 28px 24px 20px;
      position: relative;
      z-index: 1;
      border-bottom: 1px solid var(--border);
    }

    .brand-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .brand-icon {
      width: 34px;
      height: 34px;
      background: var(--accent);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 18px var(--accent-glow);
      flex-shrink: 0;
    }

    .brand-icon svg {
      width: 18px;
      height: 18px;
      stroke: white;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
    }

    .brand-name {
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.3px;
      color: var(--text-primary);
    }

    .brand-tag {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      margin-left: 44px;
    }

    /* ── NAV ── */
    .nav-section {
      flex: 1;
      padding: 20px 14px;
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
      overflow-y: auto;
    }

    .nav-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 10px 10px 6px;
      margin-top: 4px;
    }

    .menu {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 12px;
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 400;
      transition: background 0.18s, color 0.18s, transform 0.15s;
      position: relative;
      cursor: pointer;
    }

    .menu:hover {
      background: var(--hover-bg);
      color: var(--text-primary);
      transform: translateX(2px);
    }

    .menu.active {
      background: var(--active-bg);
      color: var(--accent);
      font-weight: 500;
    }

    .menu.active::before {
      content: '';
      position: absolute;
      left: -14px;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 60%;
      background: var(--accent);
      border-radius: 0 3px 3px 0;
    }

    .menu-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.18s;
    }

    .menu.active .menu-icon {
      background: var(--accent-soft);
    }

    .menu:hover .menu-icon {
      background: rgba(255,255,255,0.08);
    }

    .menu-icon svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── FOOTER ── */
    .sidebar-footer {
      padding: 16px 14px 20px;
      border-top: 1px solid var(--border);
      position: relative;
      z-index: 1;
    }

    .user-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-radius: 10px;
      background: var(--hover-bg);
    }

    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #7c5cfc);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 13px;
      color: white;
      flex-shrink: 0;
    }

    .user-info {
      flex: 1;
      min-width: 0;
    }

    .user-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-role {
      font-size: 11px;
      color: var(--text-muted);
    }

    .user-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e;
      flex-shrink: 0;
    }

    /* ── MAIN CONTENT ── */
    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      height: 56px;
      background: var(--bg-sidebar);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      flex-shrink: 0;
    }

    .topbar-title {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.2px;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .topbar-pill {
      padding: 5px 12px;
      border-radius: 20px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 12px;
      font-weight: 500;
      border: 1px solid rgba(79,142,247,0.2);
    }

    .frame-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .content {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: var(--bg-deep);
    }

    .nav-section::-webkit-scrollbar { width: 4px; }
    .nav-section::-webkit-scrollbar-track { background: transparent; }
    .nav-section::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>

  <!-- ── SIDEBAR ── -->
  <div class="sidebar">

    <div class="brand">
      <div class="brand-logo">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
        </div>
        <span class="brand-name">My Tools</span>
      </div>
      <div class="brand-tag">Personal Workspace</div>
    </div>

    <nav class="nav-section">
      <div class="nav-label">Navigation</div>

      <a class="menu active" href="home.html" target="frame" onclick="setActive(this, 'Home')">
        <span class="menu-icon">
          <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </span>
        Home
      </a>

      <a class="menu" href="Fare-Calculator/fare.html" target="frame" onclick="setActive(this, 'Fare Calculator')">
        <span class="menu-icon">
          <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        </span>
        Fare Calculator
      </a>

      <a class="menu" href="Age-Calculator/age.html" target="frame" onclick="setActive(this, 'Age Calculator')">
        <span class="menu-icon">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </span>
        Age Calculator
      </a>

      <a class="menu" href="Layover/Layover.html" target="frame" onclick="setActive(this, 'Layover Calculate')">
        <span class="menu-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </span>
        Layover Calculate
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar">M</div>
        <div class="user-info">
          <div class="user-name">Mominur Rahman</div>
          <div class="user-role">Dashboard</div>
        </div>
        <div class="user-dot"></div>
      </div>
    </div>

  </div>

  <!-- ── MAIN ── -->
  <div class="content-area">
    <div class="topbar">
      <span class="topbar-title" id="page-title">Home</span>
      <div class="topbar-right">
        <span class="topbar-pill">● Live</span>
      </div>
    </div>
    <div class="frame-wrapper">
      <iframe class="content" name="frame" src="home.html"></iframe>
    </div>
  </div>

  <script>
    function setActive(el, title) {
      document.querySelectorAll('.menu').forEach(m => m.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('page-title').textContent = title;
    }
  </script>

</body>
</html>
